<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JediPeter</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f1a17;
      color: #e8dfcf;
    }

    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 52px 22px;
    }

    .card {
      background: #182420;
      border: 1px solid #3f5f57;
      border-radius: 18px;
      padding: 30px 24px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
    }

    .logo {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin-bottom: 22px;
      border: 2px solid #5f8f82;
      background: #111;
    }

    .eyebrow {
      color: #6fb5a3;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: -0.03em;
      color: #8fd4c1;
    }

    .tagline {
      margin: 12px 0 0;
      color: #b8ad96;
      line-height: 1.6;
      font-size: 0.98rem;
    }

    .divider {
      height: 1px;
      background: #2f4a43;
      margin: 24px 0;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 16px;
      border: 1px solid #3f5f57;
      border-radius: 12px;
      background: #1f302b;
      color: #e8dfcf;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.18s ease;
    }

    .link span {
      color: #6fb5a3;
    }

    .link:hover {
  border-color: #8fd4c1;
  background: #263a34;
  transform: translateY(-1px);
  box-shadow: 0 8px 18px rgba(143, 212, 193, 0.12);
}

    .footer {
      margin-top: 22px;
      color: #8ea69e;
      font-size: 0.85rem;
      line-height: 1.5;
      text-align: center;
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">
        <img class="logo" src="../assets/jp.jpeg" alt="JediPeter logo">      <div class="eyebrow">JediPeter</div>

      <div class="divider"></div>

      <div class="links">

        <a class="link" href="https://substack.com/@peterthompson1" target="_blank" rel="noopener noreferrer">Substack <span>→</span></a>
        <a class="link" href="mailto:jp@peterthompson.co?subject=Inquiry"> Contact Me <span></span>
        <a class="link" href="https://peterthompson.co" >Main Site <span>→</span></a>
      </div>
    </section>

    <p class="footer">
      Let's figure out how you can grow. 
    </p>

</html>
